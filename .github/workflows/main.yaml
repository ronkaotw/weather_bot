name: Deploy to Heroky
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: akhileshns/heroku-deploy@v3.12.12
        with:
          branch: "main"
          heroku_api_key: HRKU-581d7df3-fd6d-42e7-b9ea-7bd764420057
          heroku_app_name: "telegram-airport-weather-bot"
          heroku_email: aaronkao88@gmail.com
          # HEROKU_API_KEY and HEROKU_EMAIL will need to be set in repository secrets
